name: busgo_mobile
description: "A premium mobile companion application for BusGo passenger booking system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Routing & Navigation
  go_router: ^13.2.0

  # High-Fidelity UI & Assets
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8

  # Localization & Utils
  intl: ^0.19.0
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.1

  # Social Login (Google + Facebook)
  google_sign_in: ^6.2.2
  google_sign_in_web: ^0.12.2
  google_identity_services_web: ^0.3.0
  flutter_facebook_auth: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - busgo.jpg
    - assets/images/
    - assets/icons/
