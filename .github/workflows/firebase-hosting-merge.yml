name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy mã nguồn từ GitHub
      - uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cài đặt Flutter Action
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Tải các thư viện phụ thuộc của dự án
      - run: flutter pub get

      # 5. Build dự án sang phiên bản Web tĩnh
      - run: flutter build web --release

      # 6. Deploy thư mục build/web lên Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUSGO_FB8BB }}'
          projectId: busgo-fb8bb
          channelId: live
