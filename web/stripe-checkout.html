<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusGo - Thanh toán bằng thẻ</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.95);
      border-radius: 16px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,102,241,0.15);
      backdrop-filter: blur(20px);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #6366f1, #4f46e5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo p {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.3), transparent);
      margin: 20px 0;
    }

    #payment-element {
      margin-bottom: 24px;
    }

    #submit-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    #submit-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #818cf8, #6366f1);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(99,102,241,0.4);
    }

    #submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-message {
      color: #f87171;
      font-size: 14px;
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 12px;
      color: #64748b;
    }

    .secure-badge svg {
      width: 14px;
      height: 14px;
      fill: #64748b;
    }

    /* Success state */
    .success-container {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .success-container.show {
      display: block;
    }

    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .success-icon svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .success-container h2 {
      font-size: 22px;
      font-weight: 700;
      color: #22c55e;
      margin-bottom: 8px;
    }

    .success-container p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .form-container.hide { display: none; }

    /* Error page state */
    .error-page {
      text-align: center;
      padding: 40px 20px;
    }

    .error-page h2 {
      color: #f87171;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .error-page p {
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>🚌 BusGo</h1>
        <p>Thanh toán vé xe an toàn</p>
      </div>

      <div id="form-container" class="form-container">
        <div class="divider"></div>
        <form id="payment-form">
          <div id="payment-element"></div>
          <div id="error-message"></div>
          <button type="submit" id="submit-btn">
            Thanh toán ngay
          </button>
        </form>
        <div class="secure-badge">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
          <span>Thanh toán bảo mật bởi Stripe</span>
        </div>
      </div>

      <div id="success-container" class="success-container">
        <div class="success-icon">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </div>
        <h2>Thanh toán thành công!</h2>
        <p>Giao dịch của bạn đã được xử lý.<br>Bạn có thể đóng trang này và quay lại ứng dụng.</p>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const clientSecret = params.get('clientSecret');
    const publishableKey = params.get('pk') || 'pk_test_51TMAx95IA9jJBLJCJtgSq9yFO0OTitIeGQMfo4M2Z9otdWmINh5XTWpuT3HqytJ1IOp7muT1D53R6tgpwOemTPae00tIe4IuIy';

    if (!clientSecret) {
      document.getElementById('form-container').innerHTML = `
        <div class="error-page">
          <h2>Lỗi</h2>
          <p>Không tìm thấy thông tin thanh toán.<br>Vui lòng quay lại ứng dụng và thử lại.</p>
        </div>`;
    } else {
      const stripe = Stripe(publishableKey);
      const elements = stripe.elements({
        clientSecret: clientSecret,
        appearance: {
          theme: 'night',
          variables: {
            colorPrimary: '#6366f1',
            colorBackground: '#1e293b',
            colorText: '#e2e8f0',
            colorDanger: '#f87171',
            fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif',
            borderRadius: '8px',
            spacingUnit: '4px',
          },
          rules: {
            '.Input': {
              backgroundColor: '#0f172a',
              border: '1px solid rgba(99,102,241,0.3)',
            },
            '.Input:focus': {
              border: '1px solid #6366f1',
              boxShadow: '0 0 0 2px rgba(99,102,241,0.2)',
            },
            '.Label': {
              color: '#94a3b8',
            },
          },
        },
      });

      const paymentElement = elements.create('payment');
      paymentElement.mount('#payment-element');

      const form = document.getElementById('payment-form');
      const submitBtn = document.getElementById('submit-btn');
      const errorMessage = document.getElementById('error-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span>Đang xử lý...';
        errorMessage.textContent = '';

        const { error } = await stripe.confirmPayment({
          elements,
          confirmParams: {
            return_url: window.location.origin + '/stripe-checkout.html?result=success',
          },
          redirect: 'if_required',
        });

        if (error) {
          errorMessage.textContent = error.message || 'Đã xảy ra lỗi khi thanh toán.';
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Thanh toán ngay';
        } else {
          // Payment succeeded without redirect
          document.getElementById('form-container').classList.add('hide');
          document.getElementById('success-container').classList.add('show');
        }
      });
    }

    // Handle return from redirect
    if (params.get('result') === 'success' || params.get('redirect_status') === 'succeeded') {
      document.getElementById('form-container').classList.add('hide');
      document.getElementById('success-container').classList.add('show');
    }
  </script>
</body>
</html>
